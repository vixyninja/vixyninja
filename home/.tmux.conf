# ══════════════════════════════════════════
#  Prefix
# ══════════════════════════════════════════
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ══════════════════════════════════════════
#  General Settings
# ══════════════════════════════════════════
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g base-index 1              # windows start at 1
setw -g pane-base-index 1        # panes start at 1
set -g renumber-windows on       # renumber when closing
set -g history-limit 50000
set -g escape-time 0             # no delay for escape
set -g repeat-time 500
set -g display-time 2000
set -g focus-events on
setw -g aggressive-resize on

# ══════════════════════════════════════════
#  Copy Mode
# ══════════════════════════════════════════
# Mouse drag auto-copies to system clipboard
set -g copy-command "xclip -selection clipboard"
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel

# ══════════════════════════════════════════
#  Quick Actions
# ══════════════════════════════════════════
bind r source-file ~/.tmux.conf \; display "  Config reloaded!"

# ══════════════════════════════════════════
#  Status Bar — Clean & Modern
# ══════════════════════════════════════════
set -g status on
set -g status-interval 3
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold]  #S #[bg=#1e1e2e] "

# Right: date & time
set -g status-right-length 50
set -g status-right "#[fg=#a6adc8]  %a %b %d #[fg=#89b4fa,bold]  %H:%M "

# Window tabs
setw -g window-status-format "#[fg=#6c7086]  #I:#W "
setw -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold]  #I:#W "
setw -g window-status-separator ""

# ══════════════════════════════════════════
#  Pane Borders
# ══════════════════════════════════════════
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ══════════════════════════════════════════
#  Messages & Menus
# ══════════════════════════════════════════
set -g message-style "bg=#89b4fa,fg=#1e1e2e,bold"
set -g message-command-style "bg=#f38ba8,fg=#1e1e2e,bold"
setw -g mode-style "bg=#89b4fa,fg=#1e1e2e,bold"

# ══════════════════════════════════════════
#  Plugins (TPM)
# ══════════════════════════════════════════
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
